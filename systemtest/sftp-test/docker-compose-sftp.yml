services:
  sftp:
    image: lscr.io/linuxserver/openssh-server:latest
    container_name: sftp-test
    environment:
      PUID: 1000
      PGID: 1000
      TZ: Europe/Berlin
      USER_NAME: testuser
      USER_PASSWORD: testpassword
      PASSWORD_ACCESS: "true"
      SUDO_ACCESS: "false"
    ports:
      - "2222:2222"
    volumes:
      - sftp-data:/config
    restart: unless-stopped

volumes:
  sftp-data: