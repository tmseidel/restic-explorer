name: CI

on:
  pull_request:
    branches:
      - main
      - develop

permissions:
  contents: read

jobs:
  verify:
    name: Build and verify
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Run mvn clean verify
        run: mvn --batch-mode clean verify
