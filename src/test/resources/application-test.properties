spring.application.name=Restic Explorer Test

spring.datasource.url=jdbc:h2:mem:testdb
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop

# Flyway disabled in tests - schema is managed by Hibernate create-drop
spring.flyway.enabled=false

management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=always

restic.binary=restic
restic.timeout=10
restic.scan.check-interval=9999999

# Test encryption key (AES-256, 32 bytes)
restic.encryption.key=kL/y8FrACGQhTDdhJ6bmB3Up8WHRYzTqGUyRJOqWV/o=
