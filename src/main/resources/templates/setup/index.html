<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Setup')}"></head>
<body class="d-flex flex-column min-vh-100 bg-light">

<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-6 col-lg-5">
            <div class="text-center mb-4">
                <img th:src="@{/images/logo.svg}" alt="Logo" width="80" height="80" class="mb-3">
                <h2 th:text="#{setup.title}">Welcome to Restic Explorer</h2>
                <p class="text-muted" th:text="#{setup.subtitle}">Set up your admin account to get started.</p>
            </div>
            <div class="card shadow">
                <div class="card-body p-4">
                    <h5 class="card-title mb-3" th:text="#{setup.card.title}">Create Admin Account</h5>
                    <form th:action="@{/setup}" th:object="${setupForm}" method="post">
                        <div class="mb-3">
                            <label for="password" class="form-label" th:text="#{setup.password}">Admin Password</label>
                            <input type="password" class="form-control" id="password" th:field="*{password}"
                                   th:classappend="${#fields.hasErrors('password')} ? 'is-invalid' : ''">
                            <div class="invalid-feedback" th:if="${#fields.hasErrors('password')}" th:errors="*{password}"></div>
                            <div class="form-text" th:utext="#{setup.password.hint}">Minimum 8 characters. Username will be <strong>admin</strong>.</div>
                        </div>
                        <div class="mb-3">
                            <label for="confirmPassword" class="form-label" th:text="#{setup.confirmPassword}">Confirm Password</label>
                            <input type="password" class="form-control" id="confirmPassword" th:field="*{confirmPassword}"
                                   th:classappend="${#fields.hasErrors('confirmPassword')} ? 'is-invalid' : ''">
                            <div class="invalid-feedback" th:if="${#fields.hasErrors('confirmPassword')}" th:errors="*{confirmPassword}"></div>
                        </div>
                        <button type="submit" class="btn btn-primary w-100">
                            <i class="bi bi-shield-lock"></i> <span th:text="#{setup.submit}">Create Admin Account</span>
                        </button>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
