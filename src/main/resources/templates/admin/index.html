<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:replace="~{fragments/layout :: head('Admin')}"><title>Admin</title></head>
<body class="d-flex flex-column min-vh-100">

<nav th:replace="~{fragments/layout :: navbar}" aria-label="Main navigation"></nav>

<main class="container mt-4 flex-grow-1">
    <h2><i class="bi bi-gear"></i> <span th:text="#{admin.title}">Admin Panel</span></h2>
    <hr>

    <div th:if="${successMessage}" class="alert alert-success alert-dismissible fade show">
        <i class="bi bi-check-circle"></i> <span th:text="#{${successMessage}}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>

    <div class="row">
        <div class="col-md-6">
            <div class="card shadow-sm">
                <div class="card-header"><i class="bi bi-key"></i> <span th:text="#{admin.changePassword}">Change Password</span></div>
                <div class="card-body">
                    <form th:action="@{/admin/change-password}" th:object="${changePasswordForm}" method="post">
                        <div class="mb-3">
                            <label for="newPassword" class="form-label" th:text="#{admin.newPassword}">New Password</label>
                            <input type="password" class="form-control" id="newPassword" th:field="*{newPassword}"
                                   th:classappend="${#fields.hasErrors('newPassword')} ? 'is-invalid' : ''">
                            <div class="invalid-feedback" th:if="${#fields.hasErrors('newPassword')}" th:errors="*{newPassword}"></div>
                        </div>
                        <div class="mb-3">
                            <label for="confirmPassword" class="form-label" th:text="#{admin.confirmPassword}">Confirm Password</label>
                            <input type="password" class="form-control" id="confirmPassword" th:field="*{confirmPassword}"
                                   th:classappend="${#fields.hasErrors('confirmPassword')} ? 'is-invalid' : ''">
                            <div class="invalid-feedback" th:if="${#fields.hasErrors('confirmPassword')}" th:errors="*{confirmPassword}"></div>
                        </div>
                        <button type="submit" class="btn btn-primary">
                            <i class="bi bi-check-lg"></i> <span th:text="#{admin.changePassword.submit}">Change Password</span>
                        </button>
                    </form>
                </div>
            </div>
        </div>
        <div class="col-md-6">
            <div class="card shadow-sm">
                <div class="card-header"><i class="bi bi-info-circle"></i> <span th:text="#{admin.systemInfo}">System Information</span></div>
                <div class="card-body">
                    <dl class="row mb-0">
                        <dt class="col-sm-5" th:text="#{admin.application}">Application</dt>
                        <dd class="col-sm-7" th:text="#{app.name}">Restic Explorer</dd>
                        <dt class="col-sm-5" th:text="#{admin.version}">Version</dt>
                        <dd class="col-sm-7">1.0.0</dd>
                        <dt class="col-sm-5" th:text="#{admin.actuatorHealth}">Actuator Health</dt>
                        <dd class="col-sm-7"><a th:href="@{/actuator/health}" target="_blank">/actuator/health</a></dd>
                    </dl>
                </div>
            </div>
        </div>
    </div>
</main>

<footer th:replace="~{fragments/layout :: footer}"></footer>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
