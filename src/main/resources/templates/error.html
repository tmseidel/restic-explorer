<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Error')}"><title>Error</title></head>
<body class="d-flex flex-column min-vh-100">

<nav th:replace="~{fragments/layout :: navbar}" aria-label="Main navigation"></nav>

<main class="container mt-4 flex-grow-1">
    <div class="row justify-content-center">
        <div class="col-md-6 text-center mt-5">
            <h1 class="display-1 text-muted" th:text="${status}">500</h1>
            <h3 th:text="${error}">Error</h3>
            <p class="text-muted" th:text="${message}">An unexpected error occurred.</p>
            <a th:href="@{/}" class="btn btn-primary mt-3">
                <i class="bi bi-house"></i> <span th:text="#{error.backToDashboard}">Back to Dashboard</span>
            </a>
        </div>
    </div>
</main>

<footer th:replace="~{fragments/layout :: footer}"></footer>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
