<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:replace="~{fragments/layout :: head('Groups')}"></head>
<body class="d-flex flex-column min-vh-100">

<nav th:replace="~{fragments/layout :: navbar}"></nav>

<main class="container mt-4 flex-grow-1">
    <div class="d-flex justify-content-between align-items-center mb-3">
        <h2><i class="bi bi-collection"></i> Repository Groups</h2>
        <a th:href="@{/groups/new}" class="btn btn-primary">
            <i class="bi bi-plus-lg"></i> Add Group
        </a>
    </div>

    <div th:if="${successMessage}" class="alert alert-success alert-dismissible fade show">
        <i class="bi bi-check-circle"></i> <span th:text="${successMessage}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>

    <div th:if="${#lists.isEmpty(groups)}" class="text-center text-muted mt-5">
        <i class="bi bi-collection" style="font-size: 4rem;"></i>
        <p class="mt-3 fs-5">No groups configured yet.</p>
        <a th:href="@{/groups/new}" class="btn btn-primary">
            <i class="bi bi-plus-lg"></i> Create Your First Group
        </a>
    </div>

    <div th:if="${!#lists.isEmpty(groups)}" class="table-responsive">
        <table class="table table-hover">
            <thead class="table-light">
                <tr>
                    <th>Name</th>
                    <th>Description</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="group : ${groups}">
                    <td th:text="${group.name}">Group</td>
                    <td th:text="${group.description}" class="text-muted">Description</td>
                    <td>
                        <a th:href="@{/groups/{id}/edit(id=${group.id})}"
                           class="btn btn-sm btn-outline-warning">
                            <i class="bi bi-pencil"></i> Edit
                        </a>
                        <form th:action="@{/groups/{id}/delete(id=${group.id})}" method="post" class="d-inline"
                              onsubmit="return confirm('Are you sure you want to delete this group?')">
                            <button type="submit" class="btn btn-sm btn-outline-danger">
                                <i class="bi bi-trash"></i> Delete
                            </button>
                        </form>
                    </td>
                </tr>
            </tbody>
        </table>
    </div>
</main>

<footer th:replace="~{fragments/layout :: footer}"></footer>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
