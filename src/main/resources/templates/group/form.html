<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Group')}"><title>Group</title></head>
<body class="d-flex flex-column min-vh-100">

<nav th:replace="~{fragments/layout :: navbar}" aria-label="Main navigation"></nav>

<main class="container mt-4 flex-grow-1">
    <nav aria-label="breadcrumb">
        <ol class="breadcrumb">
            <li class="breadcrumb-item"><a th:href="@{/groups}" th:text="#{group.title}">Groups</a></li>
            <li class="breadcrumb-item active" th:text="${groupForm.id != null} ? #{group.form.edit} : #{group.form.new}">Form</li>
        </ol>
    </nav>

    <h2 th:text="${groupForm.id != null} ? #{group.form.edit} : #{group.form.new}">Group Form</h2>
    <hr>

    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card shadow-sm">
                <div class="card-body">
                    <form th:action="@{/groups/save}" th:object="${groupForm}" method="post">
                        <input type="hidden" th:field="*{id}">

                        <div class="mb-3">
                            <label for="name" class="form-label"><span th:text="#{group.form.name}">Group Name</span> <span class="text-danger">*</span></label>
                            <input type="text" class="form-control" id="name" th:field="*{name}"
                                   th:classappend="${#fields.hasErrors('name')} ? 'is-invalid' : ''"
                                   th:placeholder="#{group.form.name.placeholder}">
                            <div class="invalid-feedback" th:if="${#fields.hasErrors('name')}" th:errors="*{name}"></div>
                        </div>

                        <div class="mb-3">
                            <label for="description" class="form-label" th:text="#{group.form.description}">Description</label>
                            <textarea class="form-control" id="description" th:field="*{description}" rows="3"
                                      th:placeholder="#{group.form.description.placeholder}"></textarea>
                        </div>

                        <div class="d-flex gap-2">
                            <button type="submit" class="btn btn-primary">
                                <i class="bi bi-check-lg"></i> <span th:text="#{group.form.save}">Save</span>
                            </button>
                            <a th:href="@{/groups}" class="btn btn-secondary">
                                <i class="bi bi-x-lg"></i> <span th:text="#{group.form.cancel}">Cancel</span>
                            </a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</main>

<footer th:replace="~{fragments/layout :: footer}"></footer>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
