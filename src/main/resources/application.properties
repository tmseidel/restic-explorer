spring.application.name=Restic Explorer

# Database - H2 (default for development)
spring.datasource.url=jdbc:h2:file:./data/restic-explorer
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.h2.console.enabled=true

# Thymeleaf
spring.thymeleaf.cache=false

# Actuator
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=always
management.info.env.enabled=true
management.info.build.enabled=true
management.info.java.enabled=true
management.info.os.enabled=true

# Info endpoint properties
info.app.name=${spring.application.name}
info.app.version=@project.version@
info.app.description=@project.description@

# Restic
restic.binary=restic
restic.timeout=300
restic.scan.check-interval=60000

# Server
server.port=8080

# Encryption - AES key for encrypting sensitive data at rest (Base64-encoded, 32 bytes for AES-256)
# Generate with: openssl rand -base64 32
# IMPORTANT: Set this in production via environment variable RESTIC_ENCRYPTION_KEY
restic.encryption.key=${RESTIC_ENCRYPTION_KEY:}
