spring.application.name=Restic Explorer

# PostgreSQL for Docker deployment
spring.datasource.url=jdbc:postgresql://${DB_HOST:db}:${DB_PORT:5432}/${DB_NAME:resticexplorer}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.username=${DB_USER:resticexplorer}
spring.datasource.password=${DB_PASSWORD:resticexplorer}
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update

# Actuator
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=always

# Restic
restic.binary=restic
restic.timeout=300
restic.scan.check-interval=60000

# Server
server.port=8080
