spring.application.name=Restic Explorer

# PostgreSQL for Docker deployment
spring.datasource.url=jdbc:postgresql://${DB_HOST:db}:${DB_PORT:5432}/${DB_NAME:resticexplorer}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.username=${DB_USER:resticexplorer}
spring.datasource.password=${DB_PASSWORD:resticexplorer}
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update

# Flyway - baseline existing databases at version 0 so V1+ migrations run on first startup
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=0

# Actuator
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=always

# Restic
restic.binary=restic
restic.timeout=300
restic.scan.check-interval=60000

# Server
server.port=8080

# Encryption
restic.encryption.key=${RESTIC_ENCRYPTION_KEY:}
